services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: tead-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: tead-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Create the single bucket used by the prototype lakehouse.
        mc alias set local http://minio:9000 minio minio123
        mc mb --ignore-existing local/lakehouse
        mc anonymous set private local/lakehouse
        exit 0
    restart: "no"

  postgres:
    image: postgres:16
    container_name: tead-postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    build:
      context: ./docker/hive
      dockerfile: Dockerfile
    container_name: tead-hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_DRIVER: postgres
      SERVICE_NAME: metastore
      SERVICE_OPTS: >-
        -Xmx1G
        -Dcom.sun.management.jmxremote
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123
    ports:
      - "9083:9083"
    volumes:
      - ./docker/hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    healthcheck:
      # Hive exposes the metastore thrift service on 9083.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083'"]
      interval: 15s
      timeout: 5s
      retries: 10

  trino:
    image: trinodb/trino:472
    container_name: tead-trino
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./docker/trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./docker/trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./docker/trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./docker/trino/etc/catalog:/etc/trino/catalog:ro
    healthcheck:
      # A simple query confirms Trino is ready to accept work, not just started.
      test: ["CMD-SHELL", "trino --execute \"SELECT 1\" >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.3
    container_name: tead-mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:///mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      # The image has Python available, so we use it instead of relying on wget/curl.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  minio_data:
  postgres_data:
  mlflow_data:
